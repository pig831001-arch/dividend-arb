name: 每日除息日程更新 (09:30 台北時間)

on:
  schedule:
    - cron: '30 1 * * 1-5'   # UTC 01:30 = 台北 09:30，週一到週五
  workflow_dispatch:          # 允許手動觸發

permissions:
  contents: write              # 允許推 commit (data/stocks.json)

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 安裝套件
        run: pip install requests

      - name: 抓除息日程與股價
        run: |
          mkdir -p data
          python fetch_exdates.py

      - name: Commit 更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          if git diff --staged --quiet; then
            echo "資料無變化，跳過 commit"
          else
            git commit -m "daily: 更新除息日程 $(date +%Y-%m-%d)"
            git push
          fi
